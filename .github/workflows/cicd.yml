name: CICD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the environment value where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - statging

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      -  name: checkout code
         run: echo "code clone from Github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      -  name: Build Docker Container
         run: echo "Docker Container built"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
